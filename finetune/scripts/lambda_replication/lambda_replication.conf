# DNABERT-2 LAMBDA_v1 replication config.
#
# Sourced by:
#   finetune/scripts/lambda_replication/run_lambda_training.sh
#   finetune/scripts/lambda_replication/run_lambda_inference.sh
#
# Workflow:
#   1. (one time) pre-warm the HF cache from a login node — see the README.
#   2. bash finetune/scripts/lambda_replication/run_lambda_training.sh
#   3. wait for jobs to finish (squeue -u $USER)
#   4. bash finetune/scripts/lambda_replication/run_lambda_inference.sh
#
# The pipeline loops over SEGMENT_LENGTHS. For each length it runs:
#   finetune x N seeds (training stage), then best-of-N seed selection by
#   test-set MCC -> winners.json, then inference on the matching-length
#   diagnostics (test/fpr/fnr/gc_control), genome-wide CSVs, and a pretrained
#   embedding analysis (linear probe + 3-layer NN). Outputs are per-length.

# --- REQUIRED -----------------------------------------------------------------

# LAMBDA_v1 dataset root. Expected structure (LAMBDA_v1 layout):
#   $LAMBDA_BASE/train_val_test/<LEN>/{train,val,test}.csv     mixed phage+bacteria
#   $LAMBDA_BASE/fpr_test/<LEN>/bacteria_segments_<LEN>.csv    bacteria-only (FPR control)
#   $LAMBDA_BASE/shuffled_controls/<LEN>/test_shuffled.csv     GC-preserving shuffled control
export LAMBDA_BASE="/vf/users/Irp-jiang/share/lindseylm/LAMBDA_v1"

# Replication output root. Per-length results land under here:
#   $OUTPUT_DIR/<LEN>/finetune/<variant>/seed-<N>/   test_results.json + saved model
#   $OUTPUT_DIR/<LEN>/embedding/<variant>/           embedding_analysis_results.json + .npz + .pkl
#   $OUTPUT_DIR/<LEN>/winners.json                   picked by run_lambda_inference.sh
#   $OUTPUT_DIR/<LEN>/inference/<variant>/           <dataset>_predictions.csv
#   $OUTPUT_DIR/<LEN>/genome_wide_analysis/<variant>/   threshold + clustering summary
#   $OUTPUT_DIR/logs/                                SLURM stdout/stderr (shared)
#
# NOTE: must live under /data/lindseylm/... — the old /gpfs/gsfs12/users/lindseylm
# path no longer exists for this account.
export OUTPUT_DIR="/data/lindseylm/GLM_EVALUATIONS/NAR_GENOMICS_LAMBDA_REPO/DNABERT2_generic_sequence_classification/outputs"

# Sequence lengths to run. DNABERT-2 supports 2k and 4k only (no 8k).
# Set to a single value (e.g. "2k") to run only one length.
export SEGMENT_LENGTHS="2k 4k"

# --- OPTIONAL: diagnostics NOT in the train_val_test split -------------------

# FNR (false negative rate) test sets — phage-only sequences. Per-length CSV.
# Variable name is FNR_<LEN> where <LEN> matches an entry in SEGMENT_LENGTHS.
# Leave empty/unset to skip the FNR diagnostic for that length.
# TODO(verify): confirm the LAMBDA_v1 phage-only paths before relying on FNR.
export FNR_2k=""
export FNR_4k=""

# Genome-wide inputs — per-length. Each is either:
#   - a CSV file (one input -> one inference job per variant), or
#   - a directory containing *.csv files (one inference job per CSV per variant,
#     then a single genome-wide analysis job aggregates them).
# Each produced predictions CSV is named genome_wide_<assembly>_predictions.csv
# so the harvest pipeline picks it up. Leave empty/unset to skip genome-wide.
# TODO(verify): confirm the LAMBDA_v1 genome-wide segment paths.
export GENOME_WIDE_2k=""
export GENOME_WIDE_4k=""

# --- OPTIONAL: model + training hyperparameters ------------------------------

# DNABERT-2 has a single architecture, so there is one "variant". Keeping the
# variant loop mirrors the ProkBERT layout (outputs/<ws>/finetune/<variant>/...).
export VARIANTS="dnabert2"

# HuggingFace base model used for every variant.
export BASE_MODEL="zhihan1996/DNABERT-2-117M"

# Random seeds for finetuning (one finetune job per variant per seed).
# The embedding analysis (linear probe + 3-layer NN) always runs with EMB_SEED.
export SEEDS="1 2 3 4 5"

# Finetune hyperparameters.
export LR="3e-5"
export BATCH_SIZE="8"
export EVAL_BATCH_SIZE="16"
export NUM_EPOCHS="3"
export USE_FP16="1"

# Per-window max token length (BPE tokens). DNABERT-2 uses BPE (~4 bp/token) and
# ALiBi position handling, so >512 is allowed. ~0.25 * bp length is a good rule
# of thumb (2000 bp -> ~500 tokens, 4000 bp -> ~1000 tokens).
# ASSUMPTION: tune these if you see truncation warnings or OOM.
export MAX_LENGTH_2k="512"
export MAX_LENGTH_4k="1024"

# Embedding analysis hyperparameters.
export POOLING="mean"           # mean | max | cls
export EMB_SEED="42"
export NN_EPOCHS="100"
export NN_LR="0.001"

# Include a random-init baseline encoder alongside pretrained ("true"|"false").
# When true, embedding_analysis_dnabert2.py also extracts embeddings from a
# randomly-initialized model, trains LP + 3-layer NN on those, and reports
# embedding power (pretrained - random). Pretrained embeddings are cached, so
# flipping false->true after a first run only adds the random arm.
export INCLUDE_RANDOM_BASELINE="true"

# --- OPTIONAL: inference -----------------------------------------------------

export INF_BATCH_SIZE="16"

# --- OPTIONAL: SLURM resources -----------------------------------------------

export FT_MEM="64g"
export FT_TIME="24:00:00"
export EMB_MEM="64g"
export EMB_TIME="4:00:00"
export INF_MEM="32g"
export INF_TIME="2:00:00"
export GA_MEM="16g"
export GA_TIME="2:00:00"
export GA_PARTITION="norm"      # genome analysis is CPU-only

# Conda environment that has torch + transformers + peft for DNABERT-2.
export CONDA_ENV="dna"
